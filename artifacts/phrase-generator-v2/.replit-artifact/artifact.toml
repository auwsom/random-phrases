kind = "web"
previewPath = "/phrase-generator-v2/"
title = "Random Phrase Generator v2"
version = "1.0.0"
id = "artifacts/phrase-generator-v2"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20932
name = "web"
paths = ["/phrase-generator-v2/"]

[services.development]
run = "pnpm --filter @workspace/phrase-generator-v2 run dev"

[services.env]
PORT = "20932"
BASE_PATH = "/phrase-generator-v2/"

[services.production]
build = ["pnpm", "--filter", "@workspace/phrase-generator-v2", "run", "build"]
publicDir = "artifacts/phrase-generator-v2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
